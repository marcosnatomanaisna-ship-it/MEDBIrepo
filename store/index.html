<style>
  :root {
    --bg: #0b1220;
    --card: #121b2e;
    --card-border: #1e2a44;
    --text: #ffffff;
    --text-soft: #93a3bd;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --danger: #f87171;
    --success: #34d399;
    --gold: #f0b429;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }

  /* Navbar */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 900;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(11,18,32,.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--card-border);
  }
  .navbar .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 15px;
  }
  .navbar .brand-logo {
    width: 26px;
    height: 26px;
    border-radius: 7px;
    flex-shrink: 0;
    display: block;
  }
  .navbar nav {
    display: flex;
    gap: 4px;
  }
  .navbar nav a {
    color: var(--text-soft);
    text-decoration: none;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 8px;
  }
  .navbar nav a:active { background: var(--card); }
  .navbar .menu-btn {
    display: none;
    background: none;
    border: 1px solid var(--card-border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 16px;
  }
  .lang-switch {
    display: flex;
    gap: 4px;
    margin-left: 6px;
    flex-shrink: 0;
  }
  .lang-switch .lang-btn {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--text-soft);
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .lang-switch .lang-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  @media (max-width: 460px) {
    .navbar > .lang-switch { display: none; }
  }
  .mobile-menu .lang-switch {
    margin: 8px 0 0;
    gap: 8px;
  }
  .mobile-menu .lang-switch .lang-btn {
    flex: 1;
    padding: 10px;
    font-size: 13px;
  }
  @media (max-width: 460px) {
    .navbar nav { display: none; }
    .navbar .menu-btn { display: block; }
  }
  .mobile-menu {
    display: none;
    flex-direction: column;
    background: var(--card);
    border-bottom: 1px solid var(--card-border);
    padding: 6px 12px 12px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    padding: 12px 6px;
    border-bottom: 1px solid var(--card-border);
  }
  .mobile-menu a:last-child { border-bottom: none; }

  header {
    padding: 36px 20px 20px;
    text-align: center;
    border-bottom: 1px solid var(--card-border);
    background:
      radial-gradient(ellipse 120% 100% at 50% 0%, rgba(37,99,235,.18), transparent 60%);
  }
  header .logo { margin-bottom: 10px; }
  header .logo img {
    width: 84px;
    height: 84px;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
  }
  header h1 { margin: 0; font-size: 24px; letter-spacing: -.02em; }
  header p.tagline { margin: 6px 0 0; color: var(--text-soft); font-size: 13px; }

  .trust-strip {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 18px;
  }
  .trust-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #0e1a30;
    border: 1px solid var(--card-border);
    border-radius: 999px;
    padding: 7px 13px;
    font-size: 11.5px;
    color: var(--text-soft);
  }
  .trust-pill b { color: var(--text); font-weight: 600; }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--card-border);
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }
  .stats-row .stat { text-align: center; }
  .stats-row .stat b {
    display: block;
    font-size: 19px;
    color: var(--gold);
    font-weight: 700;
  }
  .stats-row .stat span {
    font-size: 10.5px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  #app-list {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 16px;
  }
  .section-title {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-soft);
  }

  .app-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 14px;
  }
  .app-card .icon {
    font-size: 34px;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0e1a30;
    border-radius: 14px;
    flex-shrink: 0;
  }
  .app-card .info { flex: 1; min-width: 0; }
  .app-card .name { font-weight: 600; font-size: 16px; margin: 0 0 2px; }
  .app-card .desc {
    color: var(--text-soft);
    font-size: 13px;
    margin: 0 0 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .app-card .meta { color: var(--text-soft); font-size: 11px; }
  .app-card button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    cursor: pointer;
  }
  .app-card button:active { background: var(--accent-hover); }
  .app-card button:disabled { opacity: .6; }

  #empty, #loading {
    text-align: center;
    color: var(--text-soft);
    padding: 40px 20px;
  }

  /* Modal de código de activación */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: flex; align-items: flex-end;
    z-index: 1000;
  }
  .modal {
    background: var(--card);
    border-top: 1px solid var(--card-border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 24px 20px 32px;
    text-align: center;
  }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal p { color: var(--text-soft); font-size: 13px; margin: 0 0 18px; }
  .code-box {
    background: #0e1a30;
    border: 1px dashed var(--accent);
    border-radius: 12px;
    padding: 16px;
    font-size: 26px;
    letter-spacing: 3px;
    font-weight: 700;
    margin-bottom: 10px;
    word-break: break-all;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--text);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .steps {
    text-align: left;
    background: #0e1a30;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--text-soft);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .download-btn {
    display: block;
    width: 100%;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .close-btn {
    display: block;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-soft);
    padding: 10px;
    font-size: 14px;
  }
  .warn { color: var(--danger); font-size: 12px; margin-top: 6px; }
  .plan-options {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .plan-option {
    flex: 1;
    background: #0e1a30;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }
  .plan-option input { margin: 0; flex-shrink: 0; }

  /* Cómo funciona */
  .how-section {
    max-width: 480px;
    margin: 8px auto 0;
    padding: 20px 16px 8px;
  }
  .how-steps {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 14px;
  }
  .how-step {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--card-border);
  }
  .how-step:last-child { border-bottom: none; }
  .how-step .num {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #0e1a30;
    border: 1px solid var(--accent);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }
  .how-step .body b { display: block; font-size: 14px; margin-bottom: 2px; }
  .how-step .body p { margin: 0; font-size: 12.5px; color: var(--text-soft); line-height: 1.5; }

  /* Soporte / confianza */
  .support-section {
    max-width: 480px;
    margin: 8px auto 0;
    padding: 20px 16px 8px;
  }
  .support-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .support-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px;
  }
  .support-card .ic { font-size: 20px; margin-bottom: 6px; }
  .support-card b { display: block; font-size: 13px; margin-bottom: 3px; }
  .support-card p { margin: 0; font-size: 11.5px; color: var(--text-soft); line-height: 1.4; }

  /* FAQ */
  .faq-section {
    max-width: 480px;
    margin: 8px auto 0;
    padding: 20px 16px 8px;
  }
  .faq-item {
    border-bottom: 1px solid var(--card-border);
  }
  .faq-item summary {
    padding: 14px 4px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    list-style: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .faq-item summary::-webkit-details-marker { display: none; }
  .faq-item summary::after {
    content: '+';
    color: var(--accent);
    font-size: 18px;
    flex-shrink: 0;
  }
  .faq-item[open] summary::after { content: '−'; }
  .faq-item p {
    margin: 0 4px 14px;
    font-size: 12.5px;
    color: var(--text-soft);
    line-height: 1.6;
  }

  /* Contacto */
  .contact-section {
    max-width: 480px;
    margin: 8px auto 0;
    padding: 20px 16px;
  }
  .contact-card {
    background: linear-gradient(135deg, #0e1a30, var(--card));
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }
  .contact-card b { display: block; font-size: 15px; margin-bottom: 4px; }
  .contact-card p { margin: 0 0 14px; font-size: 12.5px; color: var(--text-soft); }
  .contact-card button.wa-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25D366;
    color: #06210f;
    text-decoration: none;
    font-weight: 700;
    font-size: 13.5px;
    padding: 11px 20px;
    border-radius: 999px;
    border: none;
    font-family: inherit;
    cursor: pointer;
  }

  footer {
    text-align: center;
    padding: 28px 20px 40px;
    color: var(--text-soft);
    font-size: 11.5px;
    border-top: 1px solid var(--card-border);
    margin-top: 12px;
  }
  footer .foot-brand { color: var(--text); font-weight: 700; font-size: 13px; margin-bottom: 6px; }
  footer .foot-links { margin-top: 10px; display: flex; justify-content: center; gap: 14px; }
  footer .foot-links a { color: var(--text-soft); text-decoration: none; font-size: 11.5px; }
</style>
</head>
<body>
