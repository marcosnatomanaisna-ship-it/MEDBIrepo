<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>MEDBI Painel</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070f0c;
    --bg-soft: #0a1613;
    --card: #101f1a;
    --card-2: #142720;
    --border: #1d332b;
    --border-soft: #16241e;
    --text: #edf4f0;
    --text-dim: #7fa093;
    --text-faint: #4c6259;
    --accent: #c98a3e;
    --accent-2: #e2ab5c;
    --accent-wash: rgba(201,138,62,.12);
    --promo: #b98cd9;
    --promo-wash: rgba(185,140,217,.14);
    --mint: #4fd1ae;
    --mint-wash: rgba(79,209,174,.12);
    --danger: #ef6f6f;
    --danger-wash: rgba(239,111,111,.12);
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at 12% -10%, rgba(201,138,62,.10), transparent 42%),
      radial-gradient(circle at 100% 10%, rgba(185,140,217,.07), transparent 40%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: #10120a; }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 20px 18px calc(28px + env(safe-area-inset-bottom,0px)); }
  ::-webkit-scrollbar { height: 8px; width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  /* ---------- Ambient grid texture ---------- */
  .grid-veil {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, #000 20%, transparent 75%);
  }

  /* ---------- Login ---------- */
  .login-screen {
    position: relative; z-index: 1;
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-box {
    width: 100%; max-width: 360px;
    background: linear-gradient(180deg, var(--card-2), var(--card));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px 28px 26px;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,.6);
  }
  .brand-mark {
    width: 40px; height: 40px; border-radius: 10px;
    object-fit: cover;
    box-shadow: 0 8px 20px -8px rgba(201,138,62,.6);
  }
  .login-head { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .login-icon {
    width: 64px; height: 64px; border-radius: 16px; object-fit: cover;
    box-shadow: 0 10px 26px -10px rgba(201,138,62,.55);
    margin-bottom: 6px;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--text-dim); margin: 18px 0 8px;
  }
  .eyebrow::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 0 3px var(--mint-wash); }
  .login-box h1 { font-family: var(--font-display); font-size: 20px; margin: 0 0 4px; letter-spacing: -.01em; }
  .login-box .sub { color: var(--text-dim); font-size: 13px; margin: 0 0 22px; line-height: 1.5; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 7px;
  }
  .field input {
    width: 100%; padding: 11px 13px;
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 15px; font-family: var(--font-body);
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-wash); }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 42px; }
  .pw-toggle {
    position: absolute; top: 50%; right: 6px; transform: translateY(-50%);
    background: transparent; border: none; color: var(--text-dim);
    width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s;
  }
  .pw-toggle:hover { color: var(--text); background: var(--bg-soft); }
  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(155deg, var(--accent-2), var(--accent)); border: none; border-radius: 10px;
    color: #17130a; font-size: 14.5px; font-weight: 700; cursor: pointer; font-family: var(--font-display);
    letter-spacing: .01em;
    transition: filter .15s, transform .1s;
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .55; cursor: default; }
  .login-error {
    background: var(--danger-wash); border: 1px solid rgba(239,111,111,.35);
    color: var(--danger); font-size: 12.5px; padding: 10px 12px; border-radius: 10px;
    margin-bottom: 14px; display: none; font-family: var(--font-mono);
  }
  .login-foot {
    margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--border);
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); letter-spacing: .03em;
    display: flex; justify-content: space-between;
  }

  /* ---------- Header ---------- */
  .topbar {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    padding: 4px 0 18px; border-bottom: 1px solid var(--border); margin-bottom: 22px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .topbar h1 { font-family: var(--font-display); font-size: 17px; margin: 0; letter-spacing: -.01em; }
  .topbar .who { font-family: var(--font-mono); font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  .top-actions { display: flex; align-items: center; gap: 8px; }
  .clock {
    font-family: var(--font-mono); font-size: 11.5px; color: var(--text-dim);
    padding: 8px 10px; border: 1px solid var(--border-soft); border-radius: 8px; letter-spacing: .02em;
    display: none;
  }
  @media (min-width: 560px) { .clock { display: block; } }
  .icon-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 13px; border-radius: 9px; font-size: 12.5px; cursor: pointer; font-family: var(--font-mono);
    display: inline-flex; align-items: center; gap: 6px; transition: color .15s, border-color .15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); }
  .icon-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
  .icon-btn .spin { display: inline-block; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section-title {
    display: flex; align-items: baseline; gap: 10px;
    font-family: var(--font-mono); font-size: 11.5px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--text-dim); margin: 30px 0 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-soft); }
  .section-title b { color: var(--text); font-weight: 600; }

  /* ---------- Stat cards (ticket style) ---------- */
  .stat-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(148px,1fr));
    gap: 10px;
  }
  .stat-card {
    position: relative;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 15px 15px 14px; overflow: hidden;
  }
  .stat-card .tag-eyebrow {
    font-family: var(--font-mono); font-size: 9.5px; letter-spacing: .09em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 8px; display: block;
  }
  .stat-card .num {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 24px; font-weight: 700; letter-spacing: -.01em;
  }
  .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  .stat-card.gold .num { color: var(--accent-2); }
  .stat-card.success .num { color: var(--mint); }
  .stat-card.promo .num { color: var(--promo); }

  .stat-card.hero {
    grid-column: span 2;
    background: linear-gradient(135deg, var(--accent-wash), var(--card));
    border-color: rgba(201,138,62,.35);
    padding-bottom: 22px;
  }
  .stat-card.hero::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: -7px; height: 14px;
    background: radial-gradient(circle at 7px 0, transparent 7px, var(--bg) 8px) 0 -7px / 14px 14px repeat-x;
  }
  .stat-card.hero .num { font-size: 30px; color: var(--accent-2); }
  .stat-card.hero .num .unit { font-size: 13px; color: var(--text-dim); font-family: var(--font-body); margin-left: 6px; }
  @media (max-width: 420px) { .stat-card.hero { grid-column: span 2; } }

  /* ---------- App cards ---------- */
  .app-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 17px; margin-bottom: 12px;
  }
  .app-card .head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .app-card .head h3 { margin: 0; font-family: var(--font-display); font-size: 15.5px; letter-spacing: -.005em; }
  .app-card .head .pill {
    font-family: var(--font-mono); font-size: 10.5px; color: var(--text-dim);
    border: 1px solid var(--border-soft); padding: 3px 9px; border-radius: 999px;
  }
  .app-card .head .pill.free { color: var(--mint); border-color: rgba(79,209,174,.3); }
  .mini-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(105px,1fr)); gap: 10px 14px; }
  .mini-grid .mini { text-align: left; border-left: 2px solid var(--border-soft); padding-left: 10px; }
  .mini-grid .mini b { display: block; font-family: var(--font-mono); font-size: 17px; font-variant-numeric: tabular-nums; }
  .mini-grid .mini small { color: var(--text-dim); font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; }
  .bar-outer { height: 6px; border-radius: 4px; background: var(--bg-soft); overflow: hidden; margin-top: 14px; }
  .bar-inner { height: 100%; background: linear-gradient(90deg, var(--mint), #7fe6cb); border-radius: 4px; transition: width .6s ease; }
  .conv-label { font-size: 11px; color: var(--text-dim); margin-top: 7px; font-family: var(--font-mono); }
  .conv-label b { color: var(--text); }

  /* ---------- Chart ---------- */
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 18px 12px;
  }
  .chart-scroll {
    overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .chart-bars {
    display: flex; align-items: flex-end; gap: 8px; height: 130px;
    min-width: 100%; width: max-content;
  }
  .chart-col { flex: 0 0 26px; width: 26px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
  .chart-col .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; transition: height .5s ease; }
  .chart-col .bar.promo { background: var(--promo); border-radius: 3px 3px 0 0; }
  .chart-col:hover .bar { filter: brightness(1.25); }
  .chart-labels { display: flex; gap: 8px; margin-top: 8px; width: max-content; min-width: 100%; }
  .chart-labels span { flex: 0 0 26px; width: 26px; text-align: center; font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
  .chart-hint { font-size: 10.5px; color: var(--text-faint); text-align: right; margin-bottom: 6px; font-family: var(--font-mono); }
  .legend { display: flex; gap: 18px; font-size: 11.5px; color: var(--text-dim); margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border-soft); font-family: var(--font-mono); }
  .legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; }

  /* ---------- Table ---------- */
  .table-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .search-input {
    flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 12px; color: var(--text); font-size: 13px; font-family: var(--font-mono);
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-faint); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; color: var(--text-dim); font-weight: 500; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: .06em; font-family: var(--font-mono);
    padding: 10px 12px; border-bottom: 1px solid var(--border);
  }
  tbody td { padding: 11px 12px; border-bottom: 1px solid var(--border-soft); }
  tbody tr { transition: background .12s; }
  tbody tr:hover { background: rgba(255,255,255,.02); }
  tbody tr:last-child td { border-bottom: none; }
  td.code { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }
  .tag {
    display: inline-block; font-family: var(--font-mono); font-size: 10px; padding: 3px 9px; border-radius: 999px;
    background: var(--accent-wash); color: var(--accent-2);
  }
  .tag.promo { background: var(--promo-wash); color: var(--promo); }
  .status { font-size: 12px; display: inline-flex; align-items: center; gap: 6px; }
  .status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
  .status.on::before { background: var(--mint); box-shadow: 0 0 0 3px var(--mint-wash); }
  .status.off::before { background: var(--text-faint); }
  .table-wrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  .table-wrap table { min-width: 620px; }

  .note {
    position: relative;
    font-size: 12px; color: var(--text-dim); background: var(--card);
    border: 1px solid var(--border); border-left: 3px solid var(--accent);
    border-radius: 10px; padding: 13px 15px; margin-top: 20px; line-height: 1.55;
  }
  .note b { color: var(--text); }
  .center-msg { text-align: center; color: var(--text-dim); padding: 46px 0; font-size: 13px; font-family: var(--font-mono); }
  .center-msg.error { color: var(--danger); }

  /* ---------- Skeleton loading ---------- */
  .skel { background: linear-gradient(90deg, var(--card) 25%, var(--card-2) 37%, var(--card) 63%); background-size: 400% 100%; animation: shimmer 1.4s ease infinite; border-radius: 12px; }
  @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }
  .skel-row { height: 78px; margin-bottom: 10px; }
  .skel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(148px,1fr)); gap: 10px; }
  .skel-grid .skel { height: 78px; }

  @media (prefers-reduced-motion: reduce) {
    .icon-btn .spin, .skel { animation: none; }
    .bar-inner, .chart-col .bar { transition: none; }
  }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
(function () {
  'use strict';

  // ---- Ligação Supabase ----
  const SUPABASE_URL = 'https://ncfsxndwkyrlntmmqeya.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_Z0J-PwWmmFeOKbgT4Qp5uw__8AAP6Vk';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const loginScreen = document.getElementById('loginScreen');
  const dashScreen = document.getElementById('dashScreen');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const loginBtn = document.getElementById('loginBtn');
  const whoAmI = document.getElementById('whoAmI');
  const dashContent = document.getElementById('dashContent');
  const refreshBtn = document.getElementById('refreshBtn');
  const refreshIcon = document.getElementById('refreshIcon');
  const pwToggle = document.getElementById('pwToggle');
  const pwInput = document.getElementById('password');
  const pwIconEye = document.getElementById('pwIconEye');
  const pwIconEyeOff = document.getElementById('pwIconEyeOff');
  if (pwToggle) {
    pwToggle.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      pwIconEye.style.display = show ? 'none' : 'block';
      pwIconEyeOff.style.display = show ? 'block' : 'none';
      pwToggle.setAttribute('aria-label', show ? 'Ocultar password' : 'Mostrar password');
    });
  }

  // Preço estimado por plano (edita aqui se os preços mudarem)
  const PRICE_MONTHLY = 250; // FCFA, ~30 dias
  const PRICE_ANNUAL = 2500; // FCFA, ~365 dias

  // guarda os últimos dados carregados, para permitir pesquisa sem novo pedido à base de dados
  let LAST = { apps: [], codes: [], licenses: [], downloads: [] };

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return dt.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' }) + ' ' +
           dt.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
  }
  function dayKey(d) {
    const dt = new Date(d);
    return dt.toISOString().slice(0, 10);
  }

  // ---------- Relógio ----------
  function tickClock() {
    const now = new Date();
    const s = now.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' }) + ' · ' +
              now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const clockEl = document.getElementById('clock');
    const loginClockEl = document.getElementById('loginClock');
    if (clockEl) clockEl.textContent = s;
    if (loginClockEl) loginClockEl.textContent = s;
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ---------- Contagem animada dos números ----------
  const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function animateCount(el, target) {
    if (prefersReducedMotion || target === 0) { el.textContent = target.toLocaleString('pt-PT'); return; }
    const dur = 600;
    const start = performance.now();
    function frame(now) {
      const p = Math.min(1, (now - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(target * eased).toLocaleString('pt-PT');
      if (p < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }
  function runCounters(root) {
    root.querySelectorAll('[data-count]').forEach(el => {
      const target = Number(el.getAttribute('data-count')) || 0;
      animateCount(el, target);
    });
  }

  // ---------- AUTH ----------
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = 'A entrar…';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        loginError.textContent = 'Não foi possível entrar: ' + error.message;
        loginError.style.display = 'block';
        return;
      }
      await showDashboard();
    } catch (err) {
      console.error('Erro de login:', err);
      loginError.textContent = 'Erro de ligação: ' + (err && err.message ? err.message : String(err));
      loginError.style.display = 'block';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar';
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    location.reload();
  });
  refreshBtn.addEventListener('click', loadStats);

  async function showDashboard() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { loginScreen.style.display = 'flex'; dashScreen.style.display = 'none'; return; }
    whoAmI.textContent = session.user.email;
    loginScreen.style.display = 'none';
    dashScreen.style.display = 'block';
    loadStats();
  }

  // ---------- DADOS ----------
  async function loadStats() {
    refreshBtn.disabled = true;
    refreshIcon.classList.add('spin');
    try {
      const [appsRes, codesRes, licensesRes, downloadsRes] = await Promise.all([
        sb.from('apps').select('*'),
        sb.from('codes').select('*'),
        sb.from('licenses').select('*'),
        sb.from('downloads').select('*')
      ]);
      if (appsRes.error) throw appsRes.error;
      if (codesRes.error) throw codesRes.error;
      if (licensesRes.error) throw licensesRes.error;
      // downloads é opcional: se a tabela ainda não existir no Supabase, não bloqueia o resto do painel
      const downloads = downloadsRes.error ? [] : (downloadsRes.data || []);
      LAST = { apps: appsRes.data || [], codes: codesRes.data || [], licenses: licensesRes.data || [], downloads };
      render(LAST.apps, LAST.codes, LAST.licenses, LAST.downloads);
    } catch (err) {
      dashContent.innerHTML = '<div class="center-msg error">⚠ Erro ao carregar dados: ' + esc(err.message || String(err)) + '</div>';
    } finally {
      refreshBtn.disabled = false;
      refreshIcon.classList.remove('spin');
    }
  }

  function isPromo(code) { return /^PROMO/i.test(code || ''); }

  function planPrice(createdAt, expiresAt, promo) {
    if (promo) return 0;
    const days = Math.round((new Date(expiresAt) - new Date(createdAt)) / 86400000);
    if (days >= 300) return PRICE_ANNUAL;
    if (days >= 25) return PRICE_MONTHLY;
    return 0; // trial curto ou período não identificado, não conta como venda
  }

  function buildRecentRows(licenses, apps, filterText) {
    const now = new Date();
    let list = licenses.slice().sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
    if (filterText) {
      const f = filterText.trim().toLowerCase();
      list = list.filter(l => {
        const app = apps.find(a => a.id === l.app_id);
        const appName = app ? app.name.toLowerCase() : '';
        return appName.includes(f) || String(l.code || '').toLowerCase().includes(f);
      });
    }
    return list.slice(0, filterText ? 60 : 25).map(l => {
      const app = apps.find(a => a.id === l.app_id);
      const promo = isPromo(l.code);
      const active = new Date(l.expires_at) > now;
      return `<tr>
        <td>${esc(app ? app.name : l.app_id)}</td>
        <td class="code">${esc(l.code)}</td>
        <td><span class="tag ${promo ? 'promo' : ''}">${promo ? 'Promo' : 'Paga'}</span></td>
        <td>${fmtDate(l.created_at)}</td>
        <td>${fmtDate(l.expires_at)}</td>
        <td><span class="status ${active ? 'on' : 'off'}">${active ? 'Ativa' : 'Expirada'}</span></td>
      </tr>`;
    }).join('');
  }

  function render(apps, codes, licenses, downloads) {
    downloads = downloads || [];
    const now = new Date();

    const totalApps = apps.length;
    const totalCodes = codes.length;
    const usedCodes = codes.filter(c => c.used).length;
    const paidLicenses = licenses.filter(l => !isPromo(l.code));
    const promoLicenses = licenses.filter(l => isPromo(l.code));
    const activeLicenses = licenses.filter(l => new Date(l.expires_at) > now);
    const totalDownloads = downloads.length;
    let revenue = 0;
    licenses.forEach(l => { revenue += planPrice(l.created_at, l.expires_at, isPromo(l.code)); });

    let html = '';

    // ---- Cards gerais ----
    html += `<div class="section-title"><b>Visão geral</b></div>`;
    html += `<div class="stat-grid">
      <div class="stat-card hero">
        <span class="tag-eyebrow">Receita estimada</span>
        <div class="num"><span data-count="${revenue}">0</span><span class="unit">FCFA</span></div>
        <div class="label">Soma de todas as licenças pagas e promo</div>
      </div>
      <div class="stat-card"><span class="tag-eyebrow">Catálogo</span><div class="num" data-count="${totalApps}">0</div><div class="label">Apps na loja</div></div>
      <div class="stat-card"><span class="tag-eyebrow">Emitidos</span><div class="num" data-count="${totalCodes}">0</div><div class="label">Códigos gerados</div></div>
      <div class="stat-card success"><span class="tag-eyebrow">Convertidos</span><div class="num" data-count="${usedCodes}">0</div><div class="label">Códigos ativados</div></div>
      <div class="stat-card"><span class="tag-eyebrow">Agora</span><div class="num" data-count="${activeLicenses.length}">0</div><div class="label">Licenças ativas</div></div>
      <div class="stat-card gold"><span class="tag-eyebrow">Vendas</span><div class="num" data-count="${paidLicenses.length}">0</div><div class="label">Ativações pagas</div></div>
      <div class="stat-card promo"><span class="tag-eyebrow">Cortesia</span><div class="num" data-count="${promoLicenses.length}">0</div><div class="label">Ativações promo</div></div>
      <div class="stat-card"><span class="tag-eyebrow">Downloads</span><div class="num" data-count="${totalDownloads}">0</div><div class="label">Apps grátis descarregadas</div></div>
    </div>`;

    // ---- Por app ----
    html += `<div class="section-title"><b>Por aplicação</b></div>`;
    if (!apps.length) {
      html += `<div class="note">Ainda não existem apps registadas na loja.</div>`;
    }
    apps.forEach(app => {
      const appCodes = codes.filter(c => c.app_id === app.id);
      const appLicenses = licenses.filter(l => l.app_id === app.id);
      const appActive = appLicenses.filter(l => new Date(l.expires_at) > now).length;
      const appUsed = appCodes.filter(c => c.used).length;
      const appDownloads = downloads.filter(d => d.app_id === app.id).length;
      const conv = appCodes.length ? Math.round((appUsed / appCodes.length) * 100) : 0;
      let appRevenue = 0;
      appLicenses.forEach(l => { appRevenue += planPrice(l.created_at, l.expires_at, isPromo(l.code)); });

      html += `<div class="app-card">
        <div class="head">
          <h3>${esc(app.name)}</h3>
          <span class="pill ${app.is_free ? 'free' : ''}">${app.is_free ? 'Gratuita' : 'Paga'} · v${esc(app.version)}</span>
        </div>
        <div class="mini-grid">
          ${app.is_free
            ? `<div class="mini"><b>${appDownloads}</b><small>Downloads</small></div>`
            : `<div class="mini"><b>${appCodes.length}</b><small>Códigos gerados</small></div>`}
          <div class="mini"><b>${appUsed}</b><small>Ativados</small></div>
          <div class="mini"><b>${appActive}</b><small>Licenças ativas</small></div>
          <div class="mini"><b>${appRevenue.toLocaleString('pt-PT')}</b><small>Receita FCFA</small></div>
        </div>
        ${app.is_free ? '' : `
        <div class="bar-outer"><div class="bar-inner" style="width:${conv}%"></div></div>
        <div class="conv-label"><b>${conv}%</b> dos códigos gerados foram ativados</div>`}
      </div>`;
    });

    // ---- Gráfico últimos 14 dias ----
    const days = [];
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(dayKey(d));
    }
    const perDay = {};
    days.forEach(d => { perDay[d] = { paid: 0, promo: 0 }; });
    licenses.forEach(l => {
      const k = dayKey(l.created_at);
      if (perDay[k]) { isPromo(l.code) ? perDay[k].promo++ : perDay[k].paid++; }
    });
    const maxVal = Math.max(1, ...days.map(d => perDay[d].paid + perDay[d].promo));
    const total14 = days.reduce((s,d) => s + perDay[d].paid + perDay[d].promo, 0);

    html += `<div class="section-title"><b>Ativações</b> últimos 14 dias · ${total14} no total</div>`;
    html += `<div class="chart-card">
      <div class="chart-hint">⟷ deslize para ver cada dia</div>
      <div class="chart-scroll" id="chartScroll">
      <div class="chart-bars">`;
    days.forEach(d => {
      const v = perDay[d];
      const totalH = ((v.paid + v.promo) / maxVal) * 100;
      const paidH = v.paid + v.promo > 0 ? (v.paid / (v.paid + v.promo)) * totalH : 0;
      const promoH = totalH - paidH;
      html += `<div class="chart-col" title="${d}: ${v.paid} pagas, ${v.promo} promo">
          <div class="bar promo" style="height:${promoH}%"></div>
          <div class="bar" style="height:${paidH}%"></div>
        </div>`;
    });
    html += `</div><div class="chart-labels">`;
    days.forEach(d => { html += `<span>${d.slice(8,10)}/${d.slice(5,7)}</span>`; });
    html += `</div>
      </div>
      <div class="legend">
        <span><i class="dot" style="background:var(--accent)"></i>Pagas</span>
        <span><i class="dot" style="background:var(--promo)"></i>Promo</span>
      </div>
    </div>`;

    // ---- Tabela últimas ativações ----
    html += `<div class="section-title"><b>Últimas ativações</b></div>`;
    html += `<div class="table-toolbar">
      <input type="text" class="search-input" id="tableSearch" placeholder="Pesquisar por app ou código…">
    </div>`;
    html += `<div class="table-wrap"><table><thead><tr>
        <th>App</th><th>Código</th><th>Tipo</th><th>Ativada em</th><th>Expira em</th><th>Estado</th>
      </tr></thead><tbody id="recentBody">`;
    const rows = buildRecentRows(licenses, apps, '');
    html += rows || `<tr><td colspan="6" style="text-align:center;color:var(--text-dim);">Sem ativações ainda.</td></tr>`;
    html += `</tbody></table></div>`;

    html += `<div class="note">
      Nota: a receita é uma <b>estimativa</b> baseada na duração de cada licença (≈30 dias = ${PRICE_MONTHLY} FCFA, ≈365 dias = ${PRICE_ANNUAL} FCFA) —
      ajusta os valores no código se os preços mudarem.
    </div>`;

    dashContent.innerHTML = html;
    runCounters(dashContent);

    const chartScroll = document.getElementById('chartScroll');
    if (chartScroll) { chartScroll.scrollLeft = chartScroll.scrollWidth; }

    const searchInput = document.getElementById('tableSearch');
    if (searchInput) {
      searchInput.addEventListener('input', () => {
        const body = document.getElementById('recentBody');
        const rows2 = buildRecentRows(LAST.licenses, LAST.apps, searchInput.value);
        body.innerHTML = rows2 || `<tr><td colspan="6" style="text-align:center;color:var(--text-dim);">Sem resultados para essa pesquisa.</td></tr>`;
      });
    }
  }

  // ---------- Arranque ----------
  (async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (session) { showDashboard(); }
  })();
})();
</script>
</body>
</html>
